<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessibilité - Bibliothèque</title>
    
    <!-- Encodage et langage bien définis -->
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="Content-Language" content="fr">
    
        <style>
      /* ===== VARIABLES CSS ===== */
      :root {
          --black: #000000;
          --red: #d32f2f;
          --teal: #00796b;
          --cyan: #52B782;
          --white: #ffffff;
          --gray-dark: #777981;
      }

      /* ===== RESET ===== */
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      /* ===== BASE ===== */
      body {
          /* Utilisation de polices système standard */
          font-family: Georgia, 'Times New Roman', Times, serif;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
          text-rendering: optimizeLegibility;
      }

      .bg-white { background-color: var(--white); }

      .title {
          color: var(--black);
          padding: 3rem 1rem;
          text-align: center;
      }

      .title h1 {
          margin-bottom: 0.625rem;
          font-size: 2.375rem;
          font-weight: 400;
          letter-spacing: 0.5rem;
          text-transform: uppercase;
          line-height: 1.2;
      }

      .title h5 {
          color: var(--gray-dark);
          font-weight: normal;
          font-size: 1.5rem;
          margin-top: 1rem;
          /* Utilisation de polices système sans-serif */
          font-family: Arial, Helvetica, sans-serif;
      }

      /* ===== PARALLAX ===== */
      .parallax2 {
          display: flex;
          justify-content: center;
          align-items: center;
          position: relative;
          background-image: url("https://accessibilite.bib.umontreal.ca/assets/images/bib-not-user1.jpg");
          min-height: 50vh;
          background-position: center bottom;
          background-repeat: no-repeat;
          background-size: cover;
      }

      @supports (background-attachment: fixed) {
          .parallax2 { background-attachment: fixed; }
      }

      @media (max-width: 768px), (prefers-reduced-motion: reduce) {
          .parallax2 { background-attachment: scroll !important; }
      }

      .overlay {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: rgba(0,0,0,0.5);
      }

      .parallax2 h2 {
          font-size: 3rem;
          font-weight: 300;
          text-transform: uppercase;
          color: var(--white);
          text-align: center;
          padding: 0 1rem;
          text-shadow: 0 1px 3px rgba(0,0,0,0.5);
          /* Utilisation de polices système serif */
          font-family: Georgia, 'Times New Roman', Times, serif;
          line-height: 1.3;
          z-index: 1;
      }

      /* ===== PARAGRAPHES ===== */
      .paragraph {
          margin: 3rem 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          width: 100%;
          text-align: center;
      }

      .paragraph p {
          width: 90%;
          max-width: 800px;
          font-size: 1.05rem;
          line-height: 1.6;
          color: rgb(64,64,64);
          margin-bottom: 1.5rem;
          /* Utilisation de polices système serif */
          font-family: Georgia, 'Times New Roman', Times, serif;
      }

      /* ===== LETTRINES ===== */
      .second span { color: var(--teal); }

      /* ===== BOUTONS ===== */
      .btn {
          display: inline-block;
          padding: 0.75rem 1.5rem;
          margin: 0.5rem;
          text-decoration: none;
          border: 2px solid;
          border-radius: 0.75rem;
          font-weight: 400;
          text-align: center;
          cursor: pointer;
          /* Utilisation de polices système sans-serif */
          font-family: Arial, Helvetica, sans-serif;
          font-size: 1rem;
          line-height: 1.5;
          transition: all 0.3s ease;
      }

      .btn-outline-dark {
          color: #343a40;
          border-color: #343a40;
          background-color: transparent;
      }
      .btn-outline-dark:hover,
      .btn-outline-dark:focus {
          color: var(--white);
          background-color: #343a40;
          outline: none;
      }

      .btn-outline-success {
          color: #28a745;
          border-color: #28a745;
          background-color: transparent;
      }
      .btn-outline-success:hover,
      .btn-outline-success:focus {
          color: var(--white);
          background-color: #28a745;
          outline: none;
      }

      /* ===== UTILITAIRES ===== */
      .text-center { text-align: center; }
      .mt-2 { margin-top: 0.5rem; }
      .mt-3 { margin-top: 1rem; }
      .mt-5 { margin-top: 3rem; }
      .ml-2 { margin-left: 0.5rem; }
      .p-5 { padding: 3rem; }
      .position-relative { position: relative; }

      .row { display: flex; flex-wrap: wrap; justify-content: center; }
      .col-md-8 { flex: 0 0 66.666667%; max-width: 66.666667%; }
      .col-lg-6 { flex: 0 0 50%; max-width: 50%; }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
          .title h1 { font-size: 1.75rem; letter-spacing: 0.3rem; }
          .title h5 { font-size: 1.2rem; }
          .parallax2 h2 { font-size: 2rem; }
          .paragraph p { width: 95%; font-size: 1rem; }
          .col-md-8, .col-lg-6 { flex: 0 0 100%; max-width: 100%; padding: 0 15px; }
          .btn { display: block; width: 100%; max-width: 300px; margin: 0.5rem auto; }
          .ml-2 { margin-left: 0; }
      }

      @media (max-width: 480px) {
          .title h1 { font-size: 1.5rem; letter-spacing: 0.2rem; }
          .parallax2 { min-height: 25vh; }
          .parallax2 h2 { font-size: 1.5rem; }
          .p-5 { padding: 0.5rem 0.5rem; }
          .btn { margin-left:0 }
      }

      @media (prefers-reduced-motion: reduce) {
          .parallax2 { background-attachment: scroll; }
          .btn { transition: none; }
      }

      @media (prefers-color-scheme: dark) {
          .bg-white { background-color: #1a1a1a; }
          .title { color: #ffffff; }
          .title h5 { color: #cccccc; }
          .paragraph p { color: #e0e0e0; }
      }
    </style>
</head>
<body>
    <div class="bg-white">
        <section class="top">
            <div class="title p-5 text-center mt-3">
                <h1>Ressources adaptées</h1>
                <h5 class="mt-2">Outil web de gestion des fichiers en formats accessibles</h5>
            </div>
        </section>

        <section class="page bg-white">
            <div class="parallax2 position-relative">
                <div class="overlay"></div>
                <h2 class="text-center page-title text-white">Collection du Service Accessibilité</h2>
            </div>

            <div class="row">
                <div class="col-md-8 col-lg-6 paragraph second text-center">
                    <p class="mt-2">
                        <a href="https://bib.umontreal.ca/" class="btn btn-outline-dark mt-2">Site des bibliothèques</a>
                        <a href="/api/user-udem/login" class="btn btn-outline-success mt-2 ml-2">Connectez-vous</a>
                    </p>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
